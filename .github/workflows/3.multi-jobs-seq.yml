name: Multi Job seq
on: workflow_dispatch
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Build Step
              run: echo "A demo Build"
    test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Test Phase
              run: echo "Running Test cases"
    deploy:
        runs-on: ubuntu-latest
        needs: test
        steps:
            - name: Deploy Phase
              run: echo "Deploy phase"