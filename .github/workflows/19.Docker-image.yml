name: Kubernetes CI

on:
  push:
    branches:
      - main

jobs:
  pyapp-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Build Docker Image
        run: docker build -t mkvm2050/gha-pyap:${GITHUB_SHA::7} .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image to Docker Hub
        run: docker push mkvm2050/gha-pyap:${GITHUB_SHA::7}

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Update deployment.yml with latest docker tag
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          yq -i '.spec.template.spec.containers[0].image = "mkvm2050/gha-pyap:'"$SHORT_SHA"'"' k8s/pyapp-deployment.yml

      - name: Commit deployment file changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/pyapp-deployment.yml
          git commit -m "[skip ci] docker tag updated by GHA" || echo "No changes to commit"
          git push origin main